spring.application.name=task

# ── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/task_employee_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── JWT ──────────────────────────────────────────────────────────────────────
# 256-bit Base64-encoded secret key (min 32 chars for HS256)
jwt.secret=k7iOBV1xgojEskhaQ8YwRlkATTxPccfgL8XV5wesSRk=
# Token validity: 1 hour in milliseconds
jwt.expiration=3600000
